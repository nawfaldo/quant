# ── Tune automation config ────────────────────────────────────────────────────
# The runner reads this file, then runs every experiment under `experiments`
# sequentially against the backend's existing /api/tune endpoints.
#
# List-valued params (baseLot, volTarget, …) are comma-separated strings — the
# backend sweeps the cartesian product. Single values are just one-element lists.

# Backend base URL. Override on the CLI with --base-url.
base_url: "http://localhost:8080"

# Where run artifacts are written (one timestamped subfolder per experiment).
output_dir: "results"

# Polling cadence while a tune runs. No overall timeout — the runner polls until
# the job reports completed or failed, backing off exponentially between checks.
poll:
  initial_seconds: 1.0
  max_seconds: 10.0
  backoff: 1.5

# Transient HTTP failures (submit / status / download) are retried this many
# times with a linear backoff before the experiment is marked failed.
http:
  retries: 3
  retry_backoff_seconds: 2.0

experiments:
  - name: RTH_VWAP
    strategy: "RTH VWAP"
    symbol: NQ
    initialBalance: 400
    sizing: "Vol Target"
    baseLot: "0.1"
    leverage: "1"
    volTarget: "0.2"
    volHalflife: "20"
    volMaxMult: "3"
    volMinDays: "30"
    spread: 0.2
    slippage: 0
    fromDate: "2018-01-01"
    toDate: "2027-01-01"


